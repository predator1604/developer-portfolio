version: '3.9'

services:

  # ── .NET API ────────────────────────────────────────────────────────────────
  portfolio-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      MongoDB__ConnectionString: mongodb://mongodb:27017
      MongoDB__DatabaseName: portfolio_db
      Smtp__Host: mailhog
      Smtp__Port: 1025
      Smtp__FromEmail: noreply@portfolio.local
      Smtp__OwnerEmail: owner@portfolio.local
      AllowedOrigins__0: http://localhost:4200
    depends_on:
      - mongodb
      - mailhog
    networks:
      - portfolio-net
    restart: unless-stopped

  # ── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: portfolio-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - portfolio-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MailHog (local SMTP + web UI to see emails) ───────────────────────────
  mailhog:
    image: mailhog/mailhog:latest
    container_name: portfolio-mailhog
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI → http://localhost:8025
    networks:
      - portfolio-net
    restart: unless-stopped

  # ── Mongo Express (MongoDB web UI) ─────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: portfolio-mongo-express
    ports:
      - "8081:8081"   # Web UI → http://localhost:8081
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_MONGODB_PORT: 27017
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: password
    depends_on:
      - mongodb
    networks:
      - portfolio-net
    restart: unless-stopped

volumes:
  mongo-data:
    driver: local

networks:
  portfolio-net:
    driver: bridge
